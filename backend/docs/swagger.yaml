      tags:
      - Todos
    put:
      consumes:
      - application/json
      parameters:
      - description: Task ID
        in: path
        name: id
        required: true
        type: integer
      - description: Task update payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_todo_handler.updateTodoRequest'
      produces:
      - application/json
      responses: {}
